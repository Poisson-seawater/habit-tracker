version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - ./data:/data
      - ./frontend:/app/frontend:ro
    restart: always
    environment:
      - DATABASE_URL=sqlite:////data/habit_tracker.db
      - ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
      - PYTHONPATH=/app
    deploy:
      resources:
        limits:
          memory: 40M

  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.bot
    volumes:
      - ./data:/data
    restart: always
    environment:
      - DATABASE_URL=sqlite:////data/habit_tracker.db
      - ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
      - PYTHONPATH=/app
    deploy:
      resources:
        limits:
          memory: 35M
