name: Plugin Release Zip

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update. Defaults to the latest published release."
        required: false
        type: string

permissions:
  contents: write

jobs:
  package-plugin:
    name: Package Habit Tracker Control plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            tag="$RELEASE_TAG"
          elif [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="$(gh release view --json tagName --jq .tagName)"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          cd plugins
          git ls-files habit-tracker-control | zip -@ ../habit-tracker-control.zip

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag }}" habit-tracker-control.zip --clobber
