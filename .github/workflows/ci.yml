name: CI

# Se déclenche sur push et PR vers les branches d'intégration et de prod.
# `master` est inclus en transition tant que le repo n'a pas été renommé en `main`
# (voir CONTRIBUTING.md). À retirer une fois le renommage fait.
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  backend:
    name: Backend (Python / FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances back (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Lint (black, configuré dans backend/pyproject.toml)
        run: black --check backend/

      - name: Tests (pytest)
        env:
          PYTHONPATH: backend
        run: pytest backend/tests

  frontend:
    name: Frontend (Vanilla JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances front
        # package.json n'a pas (encore) de dépendances ni de lockfile.
        # `npm install` ne casse rien et prépare le terrain pour de futures deps.
        run: npm install

      # TODO: aucun linter JS configuré (eslint/prettier). En attendant, on fait une
      #       simple vérif de syntaxe du fichier front principal.
      - name: Vérif syntaxe JS
        run: node --check frontend/js/app.js

      # TODO: aucun test front. Ajouter ici si on en écrit (ex. vitest / playwright).
